name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create .htaccess for SPA routing
        run: |
          cat > dist/client/.htaccess << 'EOF'
          Options -MultiViews
          RewriteEngine On

          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [L,QSA]
          EOF

      - name: Deploy to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: "157.173.216.88"
          username: "u551651590"
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: "./dist/client/"
          server-dir: "/public_html/"
          dangerous-clean-slate: false
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
